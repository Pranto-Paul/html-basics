<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Class Timetable</title>

      <tr>
        <th>Sunday</th>

        <td>Math</td>
        <td>Free</td>
        <td>Science</td>
      </tr>

        <td>English</td>
      </tr>
      <tr>
        <th>Tuesday</th>
        <td>Math</td>
        <td>Science</td>
        <td colspan="2">English Practice</td>
      </tr>
      <tr>
        <th>Wednesday</th>
        <td>English</td>
        <td>Math</td>
        <td>Science</td>
        <td>Free</td>
      </tr>
      <tr>
        <th>Thursday</th>
        <td>Science</td>
        <td>English</td>
        <td>Math</td>
        <td>Free</td>
      </tr>
    </table>
  </body>
</html>
