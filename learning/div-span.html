<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Div and Span</title>
  </head>
  <body>
    <h2>Div - Block Level Container</h2>
    <div style="background: lightgray; padding: 10px;">
      <h3>Inside a Div</h3>
      <p>Div takes full width and creates a block.</p>
    </div>
    <div style="background: lightblue; padding: 10px; margin-top: 5px;">
      <p>This is another div block below the first one.</p>
    </div>

    <h2>Span - Inline Container</h2>
    <p>This text has a <span style="color: red;">red span</span> inside it and
    <span style="font-weight: bold;">bold span</span> here. Span stays inline.</p>
  </body>
</html>
