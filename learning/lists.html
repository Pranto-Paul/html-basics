<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lists in HTML</title>
  </head>
  <body>
    <h2>Unordered List</h2>
    <ul>
      <li>Rice</li>
      <li>Dal</li>
      <li>Vegetables</li>
      <li>Fish</li>
    </ul>

    <h2>Ordered List</h2>
    <ol>
      <li>Wake up</li>
      <li>Brush teeth</li>
      <li>Have breakfast</li>
      <li>Start studying</li>
    </ol>
  </body>
</html>
