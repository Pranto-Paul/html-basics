<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Tables</title>
  </head>
  <body>
    <h2>Colspan - Merging Columns</h2>
    <table border="1">
      <tr>
        <th colspan="2">Full Name</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>Pranto</td>
        <td>Paul</td>
        <td>20</td>
      </tr>
    </table>

    <h2>Rowspan - Merging Rows</h2>
    <table border="1">
      <tr>
        <th rowspan="2">Contact</th>
        <td>pranto@email.com</td>
      </tr>
      <tr>
        <td>01712345678</td>
      </tr>
    </table>
  </body>
</html>
