<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Textarea and Select</title>
  </head>
  <body>
    <h2>Textarea - Multi-line Input</h2>
    <textarea rows="4" cols="40">Write your message here...</textarea>

    <h2>Select Dropdown</h2>
    <select>
      <option>Bangladesh</option>
      <option>India</option>
      <option>Pakistan</option>
      <option>Nepal</option>
    </select>

    <h2>Radio Buttons</h2>
    <input type="radio" name="gender" id="male" /> <label for="male">Male</label>
    <input type="radio" name="gender" id="female" /> <label for="female">Female</label>

    <h2>Checkboxes</h2>
    <input type="checkbox" id="html" /> <label for="html">HTML</label>
    <input type="checkbox" id="css" /> <label for="css">CSS</label>
  </body>
</html>
