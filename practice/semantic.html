<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Semantic HTML</title>
  </head>
  <body>
    <header>
      <h1>My Website</h1>
      <nav>
        <a href="../index.html">Home</a>
      </nav>
    </header>

    <main>
      <article>
        <h2>What is Semantic HTML?</h2>
        <p>Semantic tags like header, nav, main, article, section, footer give meaning to content.</p>
      </article>

      <section>
        <h2>My Hobbies</h2>
        <ul>
          <li>Reading</li>
          <li>Coding</li>
        </ul>
      </section>
    </main>

    <footer>
      <p>Made by Pranto in 2022</p>
    </footer>
  </body>
</html>
