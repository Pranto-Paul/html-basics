<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tables in HTML</title>
  </head>
  <body>
    <h2>Basic Table</h2>
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Subject</th>
        <th>Grade</th>
      </tr>
      <tr>
        <td>Pranto</td>
        <td>Math</td>
        <td>A</td>
      </tr>
      <tr>
        <td>Rahim</td>
        <td>Science</td>
        <td>B</td>
      </tr>
      <tr>
        <td>Karim</td>
        <td>English</td>
        <td>A</td>
      </tr>
    </table>
  </body>
</html>
