<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Images in HTML</title>
  </head>
  <body>
    <h2>Working with Images</h2>
    <img src="../pranto.jpg" alt="my photo" width="150" />
    <p>Images use the img tag with src for file path and alt for fallback text.</p>
    <p>Width and height attributes control the size.</p>
  </body>
</html>
